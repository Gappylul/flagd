<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flagd</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./static/style.css">
</head>
<body>
<div class="shell">

    <header>
        <div class="logo">flag<span>d</span></div>
        <div class="key-wrap">
            <label for="admin-key">admin key</label>
            <input id="admin-key" class="key-input" type="password" placeholder="paste your key…" autocomplete="off">
            <span id="key-status" class="key-status"></span>
        </div>
    </header>

    <div id="toast" class="toast" style="display:none"></div>

    <p class="section-label">new flag</p>
    <form id="create-form"
          class="create-form"
          hx-post="/ui/flags"
          hx-target="#flags-list"
          hx-swap="afterbegin">
        <input name="name" required placeholder="flag-name" autocomplete="off">
        <input name="description" placeholder="description" autocomplete="off">
        <select name="enabled">
            <option value="false">disabled</option>
            <option value="true">enabled</option>
        </select>
        <button class="btn btn-create" type="submit">+ create</button>
    </form>

    <p class="section-label">flags</p>
    <div id="flags-list"
         hx-get="/ui/flags"
         hx-trigger="load"
         hx-swap="innerHTML">
        <p class="empty">loading…</p>
    </div>

</div>
<script>
    const keyInput  = document.getElementById('admin-key');
    const keyStatus = document.getElementById('key-status');
    const toast     = document.getElementById('toast');

    function setKey(key) {
        if (key) {
            document.body.setAttribute('hx-headers', JSON.stringify({ Authorization: 'Bearer ' + key }));
            keyStatus.classList.add('ok');
        } else {
            document.body.removeAttribute('hx-headers');
            keyStatus.classList.remove('ok');
        }
    }

    const stored = sessionStorage.getItem('flagd_key');
    if (stored) {
        keyInput.value = stored;
        setKey(stored);
    }

    keyInput.addEventListener('input', () => {
        const v = keyInput.value.trim();
        sessionStorage.setItem('flagd_key', v);
        setKey(v);
    });

    document.addEventListener('htmx:afterRequest', e => {
        if (e.detail.elt.id === 'create-form' && e.detail.successful) {
            e.detail.elt.reset();
        }
    });

    document.addEventListener('htmx:responseError', e => {
        const status = e.detail.xhr.status;
        const msg = status === 401
            ? 'unauthorized - check your admin key'
            : 'error ' + status + ': ' + e.detail.xhr.responseText;
        showToast(msg, status === 401 ? 'warn' : 'error');
    });

    function showToast(msg, type) {
        toast.textContent = msg;
        toast.className = 'toast toast-' + type;
        toast.style.display = 'block';
        clearTimeout(toast._t);
        toast._t = setTimeout(() => { toast.style.display = 'none'; }, 3500);
    }
</script>
</body>
</html>
